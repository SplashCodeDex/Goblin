version: "3.9"
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "uvicorn", "api.server:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - .env
    ports:
      - "8000:8000"
    # Tor is started in entrypoint; ensure ports are available inside container
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on: []
  # Frontend placeholder; recommend creating a Next.js app in ./web
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app
    depends_on:
      - api
