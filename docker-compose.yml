version: "3.9"
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["bash", "-lc", "python -m uvicorn robin.api.server:app --host 0.0.0.0 --port 8000 --workers ${UVICORN_WORKERS:-2}"]
    healthcheck:
      test: ["CMD", "bash", "-lc", "exec </dev/tcp/127.0.0.1/8000"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 20s
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app/src
      - UVICORN_WORKERS=2
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./.cache:/app/.cache
    restart: unless-stopped
    # Tor is started in entrypoint; ensure ports are available inside container
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on: []
  # Frontend placeholder; recommend creating a Next.js app in ./web
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app
    depends_on:
      api:
        condition: service_healthy
