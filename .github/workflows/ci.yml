name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff black mypy types-requests types-beautifulsoup4
      - name: Ruff
        run: ruff --version && ruff . || true
      - name: Black (check)
        run: black --check . || true
      - name: Mypy (informational)
        run: mypy --ignore-missing-imports . || true
      - name: Pytest
        run: pytest -q || true
